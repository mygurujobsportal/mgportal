<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyGuru Network - Create Account</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --slate-900: #0f172a; --slate-800: #1e293b; --slate-700: #334155; --emerald: #10b981; --blurple: #3b82f6; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: linear-gradient(-45deg, #0f172a, #111827, #1e1b4b, #0f172a); background-size: 400% 400%; animation: gradientBg 15s ease infinite; min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #f1f5f9; padding: 20px; }
        @keyframes gradientBg { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .reg-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; width: 100%; max-width: 480px; padding: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); text-align: center; }
        .title span { background: linear-gradient(135deg, var(--emerald), var(--blurple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .form-group { text-align: left; margin-bottom: 18px; }
        .form-group label { display: block; font-size: 12px; font-weight: bold; color: #cbd5e1; text-transform: uppercase; margin-bottom: 6px; }
        .input-ctrl { width: 100%; padding: 13px; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--slate-700); color: white; border-radius: 10px; font-size: 15px; outline: none; }
        .btn-reg { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--emerald), var(--blurple)); color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-reg:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(16, 185, 129, 0.3); }
        .link-footer { margin-top: 20px; font-size: 14px; color: #94a3b8; }
        .link-footer a { color: var(--emerald); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="reg-card">
    <h2 class="title" style="font-size: 26px; font-weight: 900; margin-bottom: 5px;">Join <span>MyGuru Network</span></h2>
    <p style="color:#94a3b8; font-size:13px; margin-bottom:25px;">Vault System Synchronized Identity Registry</p>

    <div class="form-group">
        <label>Profile Classification Category</label>
        <select id="ddlRole" class="input-ctrl" onchange="adjustFormFieldsDynamicLabel()">
            <option value="Teacher">👨‍🏫 Core Subject Faculty Member</option>
            <option value="School">🏢 School Campus / Institutional Employer</option>
            <option value="Parent">🏡 Private Tuition Parent Client</option>
        </select>
    </div>

    <div class="form-group">
        <label id="lblDynamicName">Full Name of Teacher</label>
        <input type="text" id="txtRegName" class="input-ctrl" placeholder="Enter valid entity name string">
    </div>

    <div class="form-group">
        <label>Mobile Reference Contact</label>
        <input type="tel" id="txtRegMobile" class="input-ctrl" placeholder="10 Digit Contact Sequence" maxlength="10">
    </div>

    <div class="form-group">
        <label>Email Link Identity</label>
        <input type="email" id="txtRegEmail" class="input-ctrl" placeholder="name@domain.com">
    </div>

    <div class="form-group">
        <label>Construct Vault Passkey</label>
        <input type="password" id="txtRegPassword" class="input-ctrl" placeholder="Minimum 6 characters block">
    </div>

    <button class="btn-reg" onclick="executeDatabaseRegistrationSequence()">Enroll Matrix Account</button>
    
    <div class="link-footer">
        Already indexed? <a href="index.html">Sign In Gate</a>
    </div>
</div>

<script src="js/supabase.js"></script>
<script>
    function adjustFormFieldsDynamicLabel() {
        const role = document.getElementById('ddlRole').value;
        const nameLabel = document.getElementById('lblDynamicName');
        const nameInput = document.getElementById('txtRegName');

        if(role === 'School') { nameLabel.innerText = "Official Institution Name"; nameInput.placeholder = "e.g., MyGuru Global School Campus"; } 
        else if(role === 'Parent') { nameLabel.innerText = "Parent / Guardian Name"; nameInput.placeholder = "e.g., Mrs. A. Vijayalaxmi"; } 
        else { nameLabel.innerText = "Full Name of Teacher"; nameInput.placeholder = "Enter valid faculty name string"; }
    }

    async function executeDatabaseRegistrationSequence() {
        const role = document.getElementById('ddlRole').value;
        const nameVal = document.getElementById('txtRegName').value.trim();
        const mobile = document.getElementById('txtRegMobile').value.trim();
        const email = document.getElementById('txtRegEmail').value.trim();
        const password = document.getElementById('txtRegPassword').value;

        if(!nameVal || !mobile || !email || !password) { alert("⚠️ All authentication bounds required!"); return; }
        if(password.length < 6) { alert("⚠️ Vault passkey must be at least 6 characters."); return; }

        try {
            // Step 1: Sign up user into Supabase Native Auth
            const { data: authResult, error: authError } = await _supabase.auth.signUp({
                email: email, password: password
            });
            if(authError) throw authError;

            const generatedUuid = authResult.user.id;

            // Step 2: Inject primary validation baseline row into public.common_users
            const { error: coreError } = await _supabase.from('common_users').insert([
                { id: generatedUuid, role: role, account_status: 'pending', subscription: 'free' }
            ]);
            if(coreError) throw coreError;

            // Step 3: Inject custom profile routing columns into designated entity table sheet
            let profileDataPacket = { id: generatedUuid, email: email, mobile: mobile, auth_id: generatedUuid, profile_status: 'pending' };
            let targetTable = "";

            if(role === 'Teacher') { targetTable = 'teacher_profiles'; profileDataPacket.full_name = nameVal; } 
            else if(role === 'School') { targetTable = 'school_profiles'; profileDataPacket.school_name = nameVal; } 
            else if(role === 'Parent') { targetTable = 'parent_profiles'; profileDataPacket.parent_name = nameVal; }

            const { error: profError } = await _supabase.from(targetTable).insert([profileDataPacket]);
            if(profError) throw profError;

            alert("🎉 Profile Enrolled Successfully into Database Directory System!");
            window.location.href = "index.html";

        } catch(e) { alert("Transaction Registry Exception: " + e.message); }
    }
</script>
</body>
</html>
