<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyGuru Teacher - Profile Setup</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .profile-card { background: #1e293b; border: 1px solid #334155; padding: 30px; border-radius: 16px; max-width: 700px; margin: 20px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 12px; font-weight: bold; color: #94a3b8; text-transform: uppercase; margin-bottom: 6px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #2e3c51; border-radius: 8px; color: white; font-size: 14px; box-sizing: border-box; }
        .form-group input:focus, .form-group textarea:focus { border-color: #38bdf8; outline: none; }
        .btn-submit { background: #10b981; color: white; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; transition: 0.2s; }
        .btn-submit:hover { background: #059669; transform: translateY(-1px); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div style="text-align: center; padding: 10px;">
            <img src="../assets/logo.png" alt="MyGuru Logo" style="max-width: 80px; height: auto; border-radius: 50%;">
            <h2>MyGuru</h2>
        </div>
        <a href="dashboard.html">డాష్‌బోర్డ్</a>
        <a href="profile.html" class="active">నా ప్రొఫైల్</a>
        <a href="classes.html">తరగతులు</a>
        <a href="jobs.html">జాబ్ సెర్చ్</a>
        <a href="#" id="logout-btn" style="margin-top: auto; color: #e74c3c;">లాగ్ అవుట్</a>
    </div>

    <div class="content">
        <div class="header">
            <h3>ప్రొఫైల్ వివరాల నిర్వహణ</h3>
            <span class="tag" style="background: #38bdf8;">Profile Setup</span>
        </div>

        <div class="profile-card">
            <form id="profile-form">
                <div class="form-group">
                    <label>పూర్తి పేరు (Full Name)</label>
                    <input type="text" id="txtFullName" required placeholder="మీ పూర్తి పేరు రాయండి">
                </div>

                <div class="form-group">
                    <label>విద్యార్హతలు (Qualifications - కామాలతో విడదీసి రాయండి)</label>
                    <input type="text" id="txtQual" placeholder="e.g., B.Sc, M.Sc Zoology, B.Ed">
                </div>

                <div class="form-group">
                    <label>బోధనా సబ్జెక్టులు (Subjects Expert Grid - కామాలతో విడదీయండి)</label>
                    <input type="text" id="txtSubjects" placeholder="e.g., Zoology, Botany, Biology">
                </div>

                <div class="form-group">
                    <label>అనుభవం (Experience in Years)</label>
                    <input type="number" id="numExp" value="0" min="0">
                </div>

                <div class="form-group">
                    <label>లింగము (Gender)</label>
                    <select id="selGender">
                        <option value="">సెలెక్ట్ చేయండి</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>రాష్ట్రం (State)</label>
                    <input type="text" id="txtState" placeholder="e.g., Telangana">
                </div>

                <div class="form-group">
                    <label>జిల్లా (District)</label>
                    <input type="text" id="txtDistrict" placeholder="e.g., Hanamkonda">
                </div>

                <div class="form-group">
                    <label>చిరునామా (Full Address)</label>
                    <textarea id="txtAddress" rows="3" placeholder="మీ పూర్తి చిరునామా"></textarea>
                </div>

                <div class="form-group">
                    <label>నా గురించి / బయో (About Me)</label>
                    <textarea id="txtAbout" rows="4" placeholder="మీ బోధనా పద్ధతులు మరియు అనుభవం గురించి క్లుప్తంగా రాయండి..."></textarea>
                </div>

                <button type="submit" class="btn-submit">ప్రొఫైల్ సేవ్ చేయి</button>
            </form>
        </div>
    </div>

    <script src="../js/supabase.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        let currentUserId = null;

        async function initProfilePage() {
            // 🎯 సెషన్ చెక్
            const session = await checkLiveUserSession('Teacher');
            if (!session) return;
            currentUserId = session.id;

            await loadExistingProfileData();
        }

        // 📥 సుపాబేస్ నుండి టీచర్ ప్రస్తుత డేటాను లోడ్ చేయడం
        async function loadExistingProfileData() {
            try {
                const { data: profile, error } = await _supabase
                    .from('teacher_profiles')
                    .select('*')
                    .eq('id', currentUserId)
                    .single();

                if (error && error.code !== 'PGRST116') throw error;

                // డేటా ఉంటే ఫీల్డ్స్‌లో నింపడం
                if (profile) {
                    document.getElementById('txtFullName').value = profile.full_name || '';
                    document.getElementById('txtQual').value = profile.qualifications || '';
                    document.getElementById('txtSubjects').value = profile.subjects || '';
                    document.getElementById('numExp').value = profile.experience || 0; // 🎯 పక్కా కాలమ్
                    document.getElementById('selGender').value = profile.gender || '';
                    document.getElementById('txtState').value = profile.state || '';
                    document.getElementById('txtDistrict').value = profile.district || '';
                    document.getElementById('txtAddress').value = profile.address || '';
                    document.getElementById('txtAbout').value = profile.about || '';
                }
            } catch (err) {
                console.error("Profile Fetch Error:", err.message);
            }
        }

        // 📤 ఫారమ్ సబ్మిట్ చేసి డేటాను సుపాబేస్ లోకి సేవ్/అప్‌డేట్ చేయడం
        document.getElementById('profile-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const payload = {
                id: currentUserId,
                full_name: document.getElementById('txtFullName').value,
                qualifications: document.getElementById('txtQual').value,
                subjects: document.getElementById('txtSubjects').value,
                experience: parseInt(document.getElementById('numExp').value) || 0, // 🎯 'experience_years' బదులు 'experience' కి మార్చాం
                gender: document.getElementById('selGender').value,
                state: document.getElementById('txtState').value,
                district: document.getElementById('txtDistrict').value,
                address: document.getElementById('txtAddress').value,
                about: document.getElementById('txtAbout').value,
                updated_at: new Date().toISOString()
            };

            try {
                // Upsert ద్వారా రికార్డ్ ఉంటే అప్‌డేట్ అవుతుంది, లేదంటే ఇన్సర్ట్ అవుతుంది
                const { error } = await _supabase
                    .from('teacher_profiles')
                    .upsert(payload);

                if (error) throw error;

                alert("✓ మీ ప్రొఫైల్ వివరాలు విజయవంతంగా సేవ్ చేయబడ్డాయి!");
                
                // లోకల్ స్టోరేజ్ అప్‌డేట్ చేసి డ్యాష్‌బోర్డ్‌కి పంపడం
                const cached = JSON.parse(localStorage.getItem('myguru_user') || '{}');
                cached.profileData = payload;
                localStorage.setItem('myguru_user', JSON.stringify(cached));
                
                window.location.href = "dashboard.html";

            } catch (err) {
                alert("ప్రొఫైల్ సేవ్ చేయడంలో లోపం: " + err.message);
            }
        });

        document.getElementById('logout-btn').addEventListener('click', async (e) => {
            e.preventDefault();
            await logoutSessionRouter();
        });

        window.onload = initProfilePage;
    </script>
</body>
</html>
