<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyGuru Teacher - Search Jobs</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .search-filter-zone { background: #1e293b; border: 1px solid #334155; padding: 20px; border-radius: 12px; margin-bottom: 25px; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .filter-group { display: flex; flex-direction: column; }
        .filter-group label { font-size: 11px; font-weight: bold; color: #94a3b8; margin-bottom: 5px; text-transform: uppercase; }
        .filter-group input, .filter-group select { padding: 10px; background: #0f172a; border: 1px solid #2e3c51; border-radius: 6px; color: white; }
        
        .jobs-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .job-card { background: #1e293b; border: 1px solid #334155; padding: 20px; border-radius: 12px; display: flex; flex-direction: column; justify-content: space-between; transition: 0.2s; }
        .job-card:hover { transform: translateY(-3px); border-color: #38bdf8; }
        .job-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px; }
        .school-info h4 { font-size: 16px; color: white; margin: 0 0 4px 0; }
        .school-info span { font-size: 13px; color: #94a3b8; }
        .job-badge { background: #0f172a; color: #38bdf8; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; border: 1px solid #2e3c51; }
        
        .job-details-meta { font-size: 13px; color: #cbd5e1; margin: 10px 0; line-height: 1.6; }
        .job-details-meta strong { color: #94a3b8; }
        
        .lock-warning { background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; color: #fca5a5; padding: 10px; border-radius: 6px; font-size: 12px; text-align: center; margin-top: 10px; }
        .btn-job-apply { width: 100%; background: #10b981; color: white; padding: 10px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-align: center; font-size: 14px; margin-top: 10px; display: block; transition: 0.2s; }
        .btn-job-apply:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    </style>
</head>
<body>

    <!-- 🧭 Left Navigation Menu -->
    <div class="sidebar">
        <div style="text-align: center; padding: 10px;">
            <img src="../assets/logo.png" alt="MyGuru Logo" style="max-width: 80px; height: auto; border-radius: 50%;">
            <h2>MyGuru Jobs</h2>
        </div>
        <a href="dashboard.html">Dashboard</a>
        <a href="profile.html">My Profile</a>
        <a href="jobs.html" class="active">Search Jobs</a>
        <a href="applied-jobs.html">Applied Jobs</a>
        <a href="interview-letters.html">Interview Letters</a>
        <a href="notifications.html">Notifications</a>
        <a href="support.html">Support</a>
        <a href="settings.html">Settings</a>
        <a href="#" id="logout-btn" style="margin-top: auto; color: #ef4444;">Logout</a>
    </div>

    <!-- 💻 Main Content -->
    <div class="content">
        <div class="header">
            <h3>ఉపాధ్యాయ ఉద్యోగాల అన్వేషణ (Search School Jobs)</h3>
            <span class="tag" style="background: #3b82f6;">Live Jobs</span>
        </div>

        <!-- 🔍 Filters Zone (మీ ఫ్రెండ్ అడిగిన ఫిల్టర్స్) -->
        <div class="search-filter-zone">
            <div class="filter-group">
                <label>Subject (సబ్జెక్ట్)</label>
                <input type="text" id="filterSubject" placeholder="e.g., Zoology, Biology" oninput="fetchFilteredJobs()">
            </div>
            <div class="filter-group">
                <label>District (జిల్లా)</label>
                <input type="text" id="filterDistrict" placeholder="e.g., Hanamkonda" oninput="fetchFilteredJobs()">
            </div>
            <div class="filter-group">
                <label>School Type</label>
                <select id="filterSchoolType" onchange="fetchFilteredJobs()">
                    <option value="">All Types</option>
                    <option value="Private">Private</option>
                    <option value="International">International</option>
                    <option value="Residential">Residential</option>
                </select>
            </div>
        </div>

        <!-- 🏢 Jobs Cards Grid Display -->
        <div class="jobs-grid" id="jobs-container">
            <p style="color: #94a3b8;">ఉద్యోగాలు లోడ్ అవుతున్నాయి...</p>
        </div>
    </div>

    <script src="../js/supabase.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        let currentTeacherId = null;
        let isProfileComplete = false;

        async function initJobSearchEngine() {
            const session = await checkLiveUserSession('Teacher');
            if (!session) return;
            currentTeacherId = session.id;

            // 1. టీచర్ ప్రొఫైల్ పర్సంటేజ్ చెక్ చేసి 100% ఉందో లేదో డిసైడ్ చేయడం
            await checkTeacherProfileBarrier();
            
            // 2. జాబ్స్ లోడ్ చేయడం
            await fetchFilteredJobs();
        }

        // 🔒 ప్రొఫైల్ లాక్ బారియర్ వెరిఫికేషన్ లాజిక్
        async function checkTeacherProfileBarrier() {
            try {
                const { data: prof } = await _supabase
                    .from('teacher_profiles')
                    .select('*')
                    .eq('id', currentTeacherId)
                    .single();

                if (prof) {
                    // మీ ఫ్రెండ్ పర్సంటేజ్ ఫార్ములా ప్రకారం అన్నీ నిండితేనే 'approved' అవుతుంది
                    if(prof.profile_status === 'approved') {
                        isProfileComplete = true;
                    }
                }
            } catch (err) {
                console.error("Barrier verification issue:", err.message);
            }
        }

        // 📥 డేటాబేస్ నుండి జాబ్స్ తేవడం + ఫిల్టర్ చేయడం
                // 📥 డేటాబేస్ నుండి జాబ్స్ తేవడం + ఫిల్టర్ చేయడం
        async function fetchFilteredJobs() {
            try {
                const subInput = document.getElementById('filterSubject').value.trim();
                const distInput = document.getElementById('filterDistrict').value.trim();
                const typeInput = document.getElementById('filterSchoolType').value;

                // 🎯 బగ్ రాకుండా ఉండటానికి '*' పెట్టి అన్ని కాలమ్స్ లాగుతున్నాం
                let query = _supabase
                    .from('school_jobs')
                    .select('*')
                    .eq('status', 'open'); 

                if (subInput) query = query.ilike('subject', `%${subInput}%`);
                if (distInput) query = query.ilike('district', `%${distInput}%`);
                
                // 🎯 కొత్తగా యాడ్ చేసిన కాలమ్ తో పక్కా ఫిల్టర్
                if (typeInput) query = query.eq('management_type', typeInput); 

                const { data: jobs, error } = await query.order('id', { ascending: false });

                if (error) throw error;

                renderJobCards(jobs);
            } catch (err) {
                document.getElementById('jobs-container').innerHTML = `<p style="color: #ef4444;">Error: ${err.message}</p>`;
            }
        }

        // 🃏 UI లో జాబ్స్ కార్డ్స్ రెండర్ చేయడం
        function renderJobCards(jobs) {
            const container = document.getElementById('jobs-container');
            if (!jobs || jobs.length === 0) {
                container.innerHTML = `<p style="color: #94a3b8;">మీరు వెతికిన సలహాలో ప్రస్తుతానికి ఉద్యోగాలు లేవు.</p>`;
                return;
            }

            container.innerHTML = '';
            jobs.forEach(job => {
                const card = document.createElement('div');
                card.className = 'job-card';

                // 🎯 undefined ని రూపుమాపడానికి టేబుల్ లో ఉండే ఏ రకమైన పేరునైనా తీసుకునే బ్యాకప్ లాజిక్
                const displayName = job.school_name || job.institution_name || job.name || 'MyGuru Partner School';
                const schoolType = job.management_type || 'Private';

                card.innerHTML = `
                    <div>
                        <div class="job-header">
                            <div class="school-info">
                                <h4>${displayName}</h4>
                                <span>📍 ${job.district}, ${job.state} <br><small style="color: #38bdf8;">Type: ${schoolType}</small></span>
                            </div>
                            <div class="job-badge">${job.subject}</div>
                        </div>
                        
                        <div class="job-details-meta">
                            <div><strong>Qualification:</strong> ${job.required_qualification || 'Any Degree'}</div>
                            <div><strong>Experience:</strong> ${job.experience_required || 0} Years</div>
                            <div><strong>Estimated Salary:</strong> ₹${job.salary_package || 'Negotiable'}</div>
                        </div>
                    </div>
                    
                    <div class="action-zone">
                        ${!isProfileComplete ? 
                            `<div class="lock-warning">⚠️ జాబ్స్ కి అప్లై చేయడానికి మీ ప్రొఫైల్‌ను 100% కంప్లీట్ చేయండి!</div>
                             <button class="btn-job-apply" disabled>Apply Locked</button>` : 
                            `<button class="btn-job-apply" onclick="applyForThisJob('${job.id}')">Apply Now</button>`
                        }
                    </div>
                `;
                container.appendChild(card);
            });
        }


        // 🚀 సింగిల్ క్లిక్ జాబ్ అప్లికేషన్ ఇంజన్ (`job_applications` టేబుల్ లోకి)
        async function applyForThisJob(jobId) {
            if(!confirm("మీరు ఈ ఉద్యోగానికి దరఖాస్తు చేయాలనుకుంటున్నారా?")) return;
        // 🚀 సింగిల్ క్లిక్ జాబ్ అప్లికేషన్ ఇంజన్ [Schema Synced & Fixed]
        async function applyForThisJob(jobId) {
            if(!confirm("మీరు ఈ ఉద్యోగానికి దరఖాస్తు చేయాలనుకుంటున్నారా?")) return;

            try {
                // 1. ముందే ఆల్రెడీ అప్లై చేసారేమో చెక్ చేయడం (school_job_id కాలమ్ తో)
                const { data: alreadyApplied, error: checkError } = await _supabase
                    .from('job_applications')
                    .select('id')
                    .eq('school_job_id', jobId) 
                    .eq('teacher_id', currentTeacherId);

                if (checkError) throw checkError;

                if (alreadyApplied && alreadyApplied.length > 0) {
                    alert("⚠️ మీరు ఆల్రెడీ ఈ ఉద్యోగానికి అప్లై చేశారు!");
                    return;
                }

                // 2. మీ కొత్త టేబుల్ స్కీమా ప్రకారం పక్కా పేలోడ్ ఇన్సర్షన్
                const { error } = await _supabase
                    .from('job_applications')
                    .insert({
                        school_job_id: jobId,         // 🎯 job_id ని school_job_id గా మార్చాం
                        teacher_id: currentTeacherId,
                        application_type: 'school',   // 🎯 NOT NULL కాబట్టి 'school' అని పంపుతున్నాం
                        employer_status: 'applied',
                        application_status: 'pending',
                        admin_status: 'pending',
                        applied_at: new Date().toISOString() // 🎯 created_at ని applied_at గా మార్చాం
                    });

                if (error) throw error;

                alert("✓ Success! మీ అప్లికేషన్ విజయవంతంగా స్కూల్‌కు పంపబడింది.");
                window.location.href = "applied-jobs.html";

            } catch (err) {
                alert("Application Error: " + err.message);
            }
        }


        document.getElementById('logout-btn').addEventListener('click', async (e) => {
            e.preventDefault();
            await logoutSessionRouter();
        });

        window.onload = initJobSearchEngine;
    </script>
</body>
</html>
