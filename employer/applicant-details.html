<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyGuru Employer - Applicant Details</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .details-card { max-width: 800px; margin: 30px auto; background: #1e293b; border-radius: 12px; padding: 25px; color: #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 1px solid #334155; }
        .back-link { display: inline-block; color: #38bdf8; text-decoration: none; font-size: 14px; font-weight: bold; margin-bottom: 20px; }
        .back-link:hover { text-decoration: underline; }

        .candidate-header { display: flex; align-items: center; gap: 20px; border-bottom: 1px solid #334155; padding-bottom: 20px; margin-bottom: 20px; }
        .candidate-avatar { width: 75px; height: 75px; border-radius: 50%; background: #0f172a; border: 2px solid #38bdf8; display: flex; align-items: center; justify-content: center; font-size: 30px; overflow: hidden; flex-shrink: 0; }
        .candidate-avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .info-box { background: #0f172a; padding: 12px 15px; border-radius: 8px; border: 1px solid #334155; }
        .info-box label { font-size: 11px; color: #94a3b8; text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 4px; }
        .info-box p { font-size: 14px; color: #f8fafc; margin: 0; font-weight: 600; }

        /* 🎥 Demo Video Container */
        .demo-video-box { background: #0f172a; border: 1px solid #f59e0b; border-radius: 8px; padding: 15px; margin: 20px 0; }
        .demo-video-box h4 { margin: 0 0 10px 0; color: #f59e0b; font-size: 15px; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 25px; }
        .btn-act { width: 100%; padding: 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; color: #fff; font-size: 14px; }
        .btn-reject { background: #ef4444; }
        .btn-shortlist { background: #3b82f6; }
        .btn-demo { background: #f59e0b; color: #000; }
        .btn-select { background: #10b981; }

        .privacy-notice { background: rgba(56, 189, 248, 0.08); border: 1px dashed #38bdf8; padding: 12px; border-radius: 6px; font-size: 12px; color: #7dd3fc; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="content">
        <div class="details-card">
            <!-- ⬅️ Back Button Included -->
            <a href="applicants.html" class="back-link">← Back to Applicants List</a>
            
            <div class="candidate-header">
                <div class="candidate-avatar" id="avatarBox">👨‍🏫</div>
                <div>
                    <h2 id="candName" style="margin:0; color:#38bdf8;">Loading Candidate...</h2>
                    <p id="candJobTitle" style="margin:5px 0 0 0; color:#94a3b8; font-size:13px;">Target Job Position</p>
                </div>
            </div>

            <div class="privacy-notice">
                🔒 <strong>Privacy Guard:</strong> టీచర్ వ్యక్తిగత ఫోన్ నంబర్ మరియు ఇమెయిల్ ఐడీ భద్రతా కారణాల దృష్ట్యా దాచబడ్డాయి.
            </div>

            <!-- Candidate Info Grid -->
            <div class="info-grid">
                <div class="info-box"><label>Qualifications</label><p id="candQual">Loading...</p></div>
                <div class="info-box"><label>Experience</label><p id="candExp">Loading...</p></div>
                <div class="info-box"><label>State / Region</label><p id="candState">Loading...</p></div>
                <div class="info-box"><label>District Location</label><p id="candDist">Loading...</p></div>
                <div class="info-box"><label>Applied Date</label><p id="candAppliedAt">Loading...</p></div>
                <div class="info-box"><label>Current Status</label><p id="candStatus" style="color:#f59e0b;">Loading...</p></div>
            </div>

            <!-- 🎥 Demo Video Section -->
            <div id="demoVideoDisplay" class="demo-video-box" style="display: none;">
                <h4>📹 Candidate Teaching Demo Video</h4>
                <div id="videoPlayerArea"></div>
            </div>

            <div class="info-box" style="margin-bottom: 20px;">
                <label>Cover Letter / Message</label>
                <p id="candCover" style="font-weight: normal; color: #cbd5e1; white-space: pre-line;">Loading message...</p>
            </div>

            <!-- Action Buttons -->
            <div class="btn-group">
                <button class="btn-act btn-shortlist" onclick="updateAppStatus('shortlisted')">Shortlist Candidate</button>
                <button class="btn-act btn-demo" onclick="updateAppStatus('demo_requested')">Request Demo Video / Lesson</button>
                <button class="btn-act btn-select" onclick="updateAppStatus('selected')">Select Candidate for Interview</button>
                <button class="btn-act btn-reject" onclick="updateAppStatus('rejected')">Reject Application</button>
            </div>
        </div>
    </div>

    <script src="../js/supabase.js"></script>
    <script>
        let currentAppId = null;

        async function loadApplicantDetails() {
            const urlParams = new URLSearchParams(window.location.search);
            currentAppId = urlParams.get('app_id') || urlParams.get('id');

            if (!currentAppId) {
                alert("అప్లికెంట్ ఐడీ దొరకలేదు!");
                window.location.href = "applicants.html";
                return;
            }

            try {
                // 1. Fetch Application Record
                const { data: app, error: appErr } = await _supabase
                    .from('job_applications')
                    .select(`
                        id,
                        teacher_id,
                        application_status,
                        employer_status,
                        applied_at,
                        cover_letter,
                        demo_video_url,
                        school_jobs (
                            job_title,
                            subject
                        )
                    `)
                    .eq('id', currentAppId)
                    .single();

                if (appErr) throw appErr;

                // 2. Fetch Teacher Profile details separately
                let teacherProf = null;
                if (app.teacher_id) {
                    const { data: tp } = await _supabase
                        .from('teacher_profiles')
                        .select('full_name, avatar_url, qualifications, experience, state, district, about')
                        .eq('id', app.teacher_id)
                        .maybeSingle();
                    
                    teacherProf = tp;
                }

                // 3. Populate HTML Elements Safely
                document.getElementById('candName').innerText = (teacherProf && teacherProf.full_name) ? teacherProf.full_name : 'Registered Teacher';
                
                if (teacherProf && teacherProf.avatar_url) {
                    document.getElementById('avatarBox').innerHTML = `<img src="${teacherProf.avatar_url}" alt="Profile Photo" onError="this.parentElement.innerHTML='👨‍🏫'">`;
                } else {
                    document.getElementById('avatarBox').innerHTML = '👨‍🏫';
                }

                document.getElementById('candJobTitle').innerText = app.school_jobs ? `${app.school_jobs.subject || ''} (${app.school_jobs.job_title || ''})` : 'Applied Job';
                document.getElementById('candQual').innerText = teacherProf ? (teacherProf.qualifications || 'N/A') : 'N/A';
                document.getElementById('candExp').innerText = teacherProf ? `${teacherProf.experience || 0} Years` : '0 Years';
                document.getElementById('candState').innerText = teacherProf ? (teacherProf.state || 'N/A') : 'N/A';
                document.getElementById('candDist').innerText = teacherProf ? (teacherProf.district || 'N/A') : 'N/A';
                document.getElementById('candAppliedAt').innerText = app.applied_at ? new Date(app.applied_at).toLocaleDateString('en-IN') : 'N/A';
                
                const st = app.employer_status || app.application_status || 'pending';
                document.getElementById('candStatus').innerText = st.toUpperCase().replace('_', ' ');
                
                document.getElementById('candCover').innerText = app.cover_letter || 'No additional notes provided.';

                // 4. Demo Video Button & Player Logic
                let videoUrl = app.demo_video_url;
                if (!videoUrl && app.cover_letter && app.cover_letter.includes("Demo Video:")) {
                    videoUrl = app.cover_letter.replace("Demo Video:", "").trim();
                }

                if (videoUrl) {
                    const demoSec = document.getElementById('demoVideoDisplay');
                    const playerArea = document.getElementById('videoPlayerArea');
                    demoSec.style.display = 'block';

                    let embedIframe = '';
                    if (videoUrl.includes('youtube.com') || videoUrl.includes('youtu.be')) {
                        let embedUrl = videoUrl;
                        if(videoUrl.includes('watch?v=')) {
                            embedUrl = videoUrl.replace('watch?v=', 'embed/');
                        } else if(videoUrl.includes('youtu.be/')) {
                            embedUrl = videoUrl.replace('youtu.be/', 'youtube.com/embed/');
                        }
                        embedIframe = `<iframe src="${embedUrl}?rel=0&modestbranding=1" style="width:100%; height:300px; border:0; border-radius:8px;" allowfullscreen></iframe>`;
                    } else {
                        embedIframe = `<a href="${videoUrl}" target="_blank" style="color:#38bdf8; font-weight:bold;">▶️ Open External Video Link</a>`;
                    }

                    playerArea.innerHTML = `
                        <button type="button" onclick="toggleVideoPlayer()" style="background:#f59e0b; color:#000; font-weight:bold; border:none; padding:10px 18px; border-radius:6px; cursor:pointer; margin-bottom:10px;">
                            ▶️ Watch Demo Video
                        </button>
                        <div id="videoContainerBox" style="display:none; margin-top:10px;">
                            ${embedIframe}
                        </div>
                    `;
                }

            } catch (err) {
                console.error("Fetch Error:", err);
                alert("డేటా లోడ్ చేయడం సాధ్యపడలేదు: " + err.message);
            }
        }

        function toggleVideoPlayer() {
            const box = document.getElementById('videoContainerBox');
            if (box) {
                box.style.display = (box.style.display === 'none') ? 'block' : 'none';
            }
        }

        async function updateAppStatus(newStatus) {
            try {
                const { error } = await _supabase
                    .from('job_applications')
                    .update({ 
                        employer_status: newStatus,
                        updated_at: new Date().toISOString()
                    })
                    .eq('id', currentAppId);

                if (error) throw error;

                alert(`✅ Status Updated to: ${newStatus.toUpperCase().replace('_', ' ')}`);
                window.location.reload();

            } catch (err) {
                alert("Status Update Failed: " + err.message);
            }
        }

        window.onload = loadApplicantDetails;
    </script>
</body>
</html>
