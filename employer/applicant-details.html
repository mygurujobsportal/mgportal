<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyGuru Employer - Applicant Details</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .details-card { max-width: 800px; margin: 30px auto; background: #1e293b; border-radius: 12px; padding: 25px; color: #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .candidate-header { display: flex; align-items: center; gap: 20px; border-bottom: 1px solid #334155; padding-bottom: 20px; margin-bottom: 20px; }
        .candidate-avatar { width: 70px; height: 70px; border-radius: 50%; background: #0f172a; border: 2px solid #38bdf8; display: flex; align-items: center; justify-content: center; font-size: 30px; overflow: hidden; }
        .candidate-avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .info-box { background: #0f172a; padding: 12px 15px; border-radius: 8px; border: 1px solid #334155; }
        .info-box label { font-size: 11px; color: #94a3b8; text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 4px; }
        .info-box p { font-size: 14px; color: #f8fafc; margin: 0; font-weight: 600; }

        /* 🎥 Demo Video Player Container */
        .demo-video-box { background: #0f172a; border: 1px solid #f59e0b; border-radius: 8px; padding: 15px; margin: 20px 0; }
        .demo-video-box h4 { margin: 0 0 10px 0; color: #f59e0b; font-size: 15px; display: flex; align-items: center; gap: 8px; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 6px; background: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 25px; }
        .btn-act { width: 100%; padding: 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; color: #fff; font-size: 14px; }
        .btn-reject { background: #ef4444; }
        .btn-shortlist { background: #3b82f6; }
        .btn-demo { background: #f59e0b; color: #000; }
        .btn-select { background: #10b981; }
    </style>
</head>
<body>

    <div class="content">
        <div class="details-card">
            <a href="applicants.html" style="color:#38bdf8; text-decoration:none; font-size:13px; font-weight:bold;">← Back to Applicants List</a>
            
            <div class="candidate-header" style="margin-top: 15px;">
                <div class="candidate-avatar" id="avatarBox">👨‍🏫</div>
                <div>
                    <h2 id="candName" style="margin:0; color:#38bdf8;">Registered Teacher</h2>
                    <p id="candJobTitle" style="margin:5px 0 0 0; color:#94a3b8; font-size:13px;">Applied Job Position</p>
                </div>
            </div>

            <!-- Candidate Info Grid -->
            <div class="info-grid">
                <div class="info-box"><label>Qualification</label><p id="candQual">Loading...</p></div>
                <div class="info-box"><label>Experience</label><p id="candExp">Loading...</p></div>
                <div class="info-box"><label>State / Region</label><p id="candState">Loading...</p></div>
                <div class="info-box"><label>District Location</label><p id="candDist">Loading...</p></div>
                <div class="info-box"><label>Applied Date</label><p id="candAppliedAt">Loading...</p></div>
                <div class="info-box"><label>Current Status</label><p id="candStatus" style="color:#f59e0b;">Loading...</p></div>
            </div>

            <!-- 🎥 Demo Video Player Section (Dynamic) -->
            <div id="demoVideoDisplay" class="demo-video-box" style="display: none;">
                <h4>📹 Candidate Teaching Demo Video</h4>
                <div id="videoPlayerArea">
                    <!-- Embedded Video or Direct Link Rendered Here -->
                </div>
            </div>

            <div class="info-box" style="margin-bottom: 20px;">
                <label>Cover Letter / Message to School</label>
                <p id="candCover" style="font-weight: normal; color: #cbd5e1; white-space: pre-line;">No message provided.</p>
            </div>

            <!-- Status Update Action Buttons -->
            <div class="btn-group">
                <button class="btn-act btn-shortlist" onclick="updateAppStatus('shortlisted')">Shortlist Candidate</button>
                <button class="btn-act btn-demo" onclick="updateAppStatus('demo_requested')">Request Demo Video/Lesson</button>
                <button class="btn-act btn-select" onclick="updateAppStatus('selected')">Select / Offer Job</button>
                <button class="btn-act btn-reject" onclick="updateAppStatus('rejected')">Reject Application</button>
            </div>
        </div>
    </div>

    <script src="../js/supabase.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        let currentAppId = null;

        async function loadApplicantDetails() {
            const session = await checkLiveUserSession('Employer');
            if (!session) return;

            const urlParams = new URLSearchParams(window.location.search);
            currentAppId = urlParams.get('app_id') || urlParams.get('id');

            if (!currentAppId) {
                alert("అప్లికెంట్ ఐడీ దొరకలేదు!");
                window.location.href = "applicants.html";
                return;
            }

            try {
                // 1. Fetch Application Details
                const { data: app, error } = await _supabase
                    .from('job_applications')
                    .select(`
                        id,
                        teacher_id,
                        application_status,
                        employer_status,
                        applied_at,
                        cover_letter,
                        demo_video_url,
                        school_jobs (
                            job_title,
                            subject
                        )
                    `)
                    .eq('id', currentAppId)
                    .single();

                if (error) throw error;

                // 2. Fetch Teacher Profile Safely (Without photo_url crash)
                let teacherProf = null;
                if (app.teacher_id) {
                    const { data: tp } = await _supabase
                        .from('teacher_profiles')
                        .select('*')
                        .eq('id', app.teacher_id)
                        .maybeSingle();
                    teacherProf = tp;
                }

                // Render Info
                document.getElementById('candName').innerText = teacherProf ? (teacherProf.full_name || teacherProf.name || 'Registered Teacher') : 'Registered Teacher';
                document.getElementById('candJobTitle').innerText = app.school_jobs ? `${app.school_jobs.subject} (${app.school_jobs.job_title})` : 'Applied Job Position';
                document.getElementById('candQual').innerText = teacherProf ? (teacherProf.qualification || teacherProf.highest_qualification || 'N/A') : 'N/A';
                document.getElementById('candExp').innerText = teacherProf ? `${teacherProf.experience_years || teacherProf.experience || 0} Years` : 'N/A';
                document.getElementById('candState').innerText = teacherProf ? (teacherProf.state || 'N/A') : 'N/A';
                document.getElementById('candDist').innerText = teacherProf ? (teacherProf.district || 'N/A') : 'N/A';
                document.getElementById('candAppliedAt').innerText = app.applied_at ? new Date(app.applied_at).toLocaleDateString('en-IN') : 'N/A';
                
                const curSt = app.employer_status || app.application_status || 'pending';
                document.getElementById('candStatus').innerText = curSt.toUpperCase().replace('_', ' ');

                // Display Cover Letter
                if (app.cover_letter) {
                    document.getElementById('candCover').innerText = app.cover_letter;
                }

                // 3. Render Demo Video Player (Check demo_video_url or cover_letter fallback)
                let rawVideoUrl = app.demo_video_url;
                if (!rawVideoUrl && app.cover_letter && app.cover_letter.includes("Demo Video:")) {
                    rawVideoUrl = app.cover_letter.replace("Demo Video:", "").trim();
                }

                if (rawVideoUrl) {
                    const demoSec = document.getElementById('demoVideoDisplay');
                    const playerArea = document.getElementById('videoPlayerArea');
                    demoSec.style.display = 'block';

                    // Check if YouTube Link
                    if (rawVideoUrl.includes('youtube.com') || rawVideoUrl.includes('youtu.be')) {
                        let embedUrl = rawVideoUrl;
                        if(rawVideoUrl.includes('watch?v=')) {
                            embedUrl = rawVideoUrl.replace('watch?v=', 'embed/');
                        } else if(rawVideoUrl.includes('youtu.be/')) {
                            embedUrl = rawVideoUrl.replace('youtu.be/', 'youtube.com/embed/');
                        }
                        playerArea.innerHTML = `
                            <div class="video-container">
                                <iframe src="${embedUrl}?rel=0&modestbranding=1" allowfullscreen></iframe>
                            </div>
                        `;
                    } else {
                        // Google Drive / Direct URL Link Fallback
                        playerArea.innerHTML = `
                            <div style="background:#1e293b; padding:15px; border-radius:6px; text-align:center;">
                                <p style="margin-bottom:10px; color:#cbd5e1;">📹 Teacher Submitted Video Link:</p>
                                <a href="${rawVideoUrl}" target="_blank" style="color:#38bdf8; font-weight:bold; word-break:break-all;">${rawVideoUrl}</a>
                            </div>
                        `;
                    }
                }

            } catch (err) {
                console.error("Applicant Load Error:", err.message);
                alert("డేటా లోడ్ చేయడంలో లోపం జరిగింది: " + err.message);
            }
        }

        async function updateAppStatus(newStatus) {
            try {
                const { error } = await _supabase
                    .from('job_applications')
                    .update({ 
                        employer_status: newStatus,
                        updated_at: new Date().toISOString()
                    })
                    .eq('id', currentAppId);

                if (error) throw error;

                alert(`✅ Status Updated to ${newStatus.toUpperCase()}`);
                window.location.reload();

            } catch (err) {
                alert("Status Update Failed: " + err.message);
            }
        }

        window.onload = loadApplicantDetails;
    </script>
</body>
</html>
