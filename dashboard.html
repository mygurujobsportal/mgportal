<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyGuru Employer - Dashboard</title>
    <!-- రూట్ ఫోల్డర్ లోని CSS లింక్ -->
    <link rel="stylesheet" href="../css/style.css">
    <!-- Supabase JS Client CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 20px; }
        .stat-card { background: #1e293b; border-left: 5px solid #3b82f6; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .stat-card h3 { font-size: 14px; color: #94a3b8; text-transform: uppercase; }
        .stat-card p { font-size: 28px; font-weight: bold; margin-top: 10px; color: white; }
        .activity-section { background: #1e293b; padding: 25px; border-radius: 12px; margin-top: 30px; border: 1px solid #334155; }
        .activity-list { list-style: none; margin-top: 15px; }
        .activity-item { padding: 12px 0; border-bottom: 1px solid #334155; font-size: 14px; display: flex; justify-content: space-between; }
        .activity-item:last-child { border-bottom: none; }
        .badge-premium { background: linear-gradient(135deg, #eab308, #ca8a04); color: #0f172a; padding: 3px 8px; border-radius: 6px; font-weight: bold; font-size: 12px; }
        .action-btns { margin-top: 20px; display: flex; gap: 15px; }
        .btn-action { padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; text-decoration: none; text-align: center; }
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; }
        .btn-secondary { background: #334155; color: white; border: 1px solid #475569; }
        .btn-action:hover { transform: translateY(-2px); }
    </style>
</head>
<body>

    <!-- 🧭 Left Menu / సైడ్‌బార్ సెక్షన్ -->
    <div class="sidebar">
        <div style="text-align: center; padding: 10px;">
            <img src="../assets/logo.png" alt="MyGuru Logo" style="max-width: 80px; height: auto; border-radius: 50%;">
            <h2>MyGuru Jobs</h2>
        </div>
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="profile.html">My Profile</a>
        <a href="post-job.html">Post Job</a>
        <a href="jobs.html">My Jobs</a>
        <a href="applicants.html">Applicants</a>
        <a href="settings.html">Settings</a>
        <a href="#" id="logout-btn" style="margin-top: auto; color: #ef4444;">Logout</a>
    </div>

    <!-- 💻 మెయిన్ కంటెంట్ సెక్షన్ -->
    <div class="content">
        <!-- హెడర్ -->
        <div class="header" style="display: flex; justify-content: space-between; align-items: center;">
            <h3 id="welcome-msg">Welcome, Loading Workspace...</h3>
            <div style="display: flex; align-items: center; gap: 15px;">
                <span id="premium-status" class="badge-premium">Standard Plan</span>
                <span style="cursor: pointer; font-size: 20px;">🔔</span>
            </div>
        </div>

        <!-- క్విక్ యాక్షన్ బటన్స్ -->
        <div class="action-btns">
            <a href="post-job.html" class="btn-action btn-primary">+ Post New Job</a>
            <a href="applicants.html" class="btn-action btn-secondary">View Applicants</a>
        </div>

        <!-- 📊 Dashboard Cards సెక్షన్ -->
        <div class="dashboard-grid">
            <div class="stat-card" style="border-left-color: #3b82f6;">
                <h3>Total Jobs Posted</h3>
                <p id="lblTotalJobs">0</p>
            </div>
            <div class="stat-card" style="border-left-color: #22c55e;">
                <h3>Active Jobs</h3>
                <p id="lblActiveJobs">0</p>
            </div>
            <div class="stat-card" style="border-left-color: #a855f7;">
                <h3>Total Applicants</h3>
                <p id="lblTotalApplicants">0</p>
            </div>
            <div class="stat-card" style="border-left-color: #eab308;">
                <h3>Shortlisted</h3>
                <p id="lblShortlisted">0</p>
            </div>
        </div>

        <!-- 🔔 Latest Activity సెక్షన్ -->
        <div class="activity-section">
            <h4>Latest Workspace Activity</h4>
            <ul class="activity-list" id="activity-logger">
                <li class="activity-item"><span style="color: #94a3b8;">No recent notifications available.</span></li>
            </ul>
        </div>
    </div>

    <!-- సెషన్ వాలిడేషన్ స్క్రిప్ట్స్ -->
    <script src="../js/supabase.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        let currentEmployerId = null;

        async function initEmployerDashboard() {
            // auth.js లోని సెషన్ గేట్ చెక్
            const activeUser = await checkLiveUserSession('School'); 
            if (!activeUser) return;

            currentEmployerId = activeUser.id;
            
            // ప్రొఫైల్ కంప్లీషన్ చెక్ (First Time Login Barrier)
            const profile = activeUser.profileData || {};
            if (!profile.institution_name) {
                alert("📢 Please complete your Institution Profile details first!");
                window.location.href = "profile.html";
                return;
            }

            // స్క్రీన్ పై వివరాలు సెట్ చేయడం
            document.getElementById('welcome-msg').innerText = `Welcome back, ${profile.institution_name}`;
            
            // ప్రీమియం సబ్‌స్క్రిప్షన్ ప్లాన్ చెక్
            if(activeUser.subscription === 'premium') {
                const badge = document.getElementById('premium-status');
                badge.innerText = "⭐ Premium Plan";
                badge.style.background = "linear-gradient(135deg, #fbbf24, #f59e0b)";
            }

            // డేటాబేస్ నుండి కౌంటర్స్ మరియు యాక్టివిటీ లోడ్ చేయడం
            await loadDashboardMetrics();
        }

        async function loadDashboardMetrics() {
            try {
                // 1. పోస్ట్ చేసిన జాబ్స్ కౌంట్
                const { data: jobs, error: jobErr } = await _supabase
                    .from('jobs')
                    .select('job_id')
                    .eq('employer_id', currentEmployerId);
                
                if (jobErr) throw jobErr;
                document.getElementById('lblTotalJobs').innerText = jobs ? jobs.length : 0;
                document.getElementById('lblActiveJobs').innerText = jobs ? jobs.length : 0; // తాత్కాలికంగా ఆక్టివ్ జాబ్స్ కౌంట్

                // 2. ఈ ఎంప్లాయర్ జాబ్స్ కి వచ్చిన అప్లికేషన్ల కౌంట్
                const jobIdsArray = jobs.map(j => j.job_id);
                
                if (jobIdsArray.length > 0) {
                    const { data: apps, error: appErr } = await _supabase
                        .from('applications')
                        .select('status')
                        .in('job_id', jobIdsArray);

                    if (appErr) throw appErr;

                    document.getElementById('lblTotalApplicants').innerText = apps ? apps.length : 0;
                    
                    const shortlistedCount = apps.filter(a => a.status === 'shortlisted' || a.status === 'selected').length;
                    document.getElementById('lblShortlisted').innerText = shortlistedCount;
                }

            } catch (err) {
                console.error("Metrics Dashboard Error:", err.message);
            }
        }

        // లాగ్ అవుట్ యాక్షన్
        document.getElementById('logout-btn').addEventListener('click', async (e) => {
            e.preventDefault();
            await logoutSessionRouter();
        });

        window.onload = initEmployerDashboard;
    </script>
</body>
</html>
