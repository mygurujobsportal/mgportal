<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyGuru Terminal - Secure Access Gateway</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --slate-900: #0f172a; --slate-800: #1e293b; --slate-700: #334155; --blurple: #3b82f6; --purple: #8b5cf6; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: linear-gradient(-45deg, #0f172a, #111827, #1e1b4b, #0f172a); background-size: 400% 400%; animation: gradientBg 15s ease infinite; min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #f1f5f9; padding: 20px; }
        @keyframes gradientBg { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .login-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; width: 100%; max-width: 450px; padding: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); text-align: center; }
        .title { font-size: 26px; font-weight: 900; margin-bottom: 5px; }
        .title span { background: linear-gradient(135deg, var(--blurple), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-size: 12px; font-weight: bold; color: #cbd5e1; text-transform: uppercase; margin-bottom: 8px; }
        .input-ctrl { width: 100%; padding: 14px; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--slate-700); color: white; border-radius: 10px; font-size: 15px; outline: none; }
        .input-ctrl:focus { border-color: var(--blurple); }
        .btn-submit { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--blurple), var(--purple)); color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(139, 92, 246, 0.3); }
        .link-footer { margin-top: 25px; font-size: 14px; color: #94a3b8; }
        .link-footer a { color: var(--blurple); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="login-card">
    <h2 class="title">MyGuru <span>Terminal</span></h2>
    <p style="color: #94a3b8; font-size: 13px; margin-bottom: 30px;">Universal Workspace Identity Gate</p>

    <div class="form-group">
        <label>Account Identity Segment</label>
        <select id="ddlRole" class="input-ctrl">
            <option value="Teacher">👨‍🏫 Professional Subject Teacher</option>
            <option value="School">🏢 School Campus / Employer Owner</option>
            <option value="Parent">🏡 Private Tuition Parent Client</option>
        </select>
    </div>

    <div class="form-group">
        <label>Registered Email</label>
        <input type="email" id="txtEmail" class="input-ctrl" placeholder="name@domain.com">
    </div>

    <div class="form-group">
        <label>Secure Passkey</label>
        <input type="password" id="txtPassword" class="input-ctrl" placeholder="••••••••••••">
    </div>

    <button class="btn-submit" onclick="executeSecureLoginGate()">Verify Authentication</button>
    
    <div class="link-footer">
        Don't have an account? <a href="register.html">Register Here</a>
    </div>
</div>

<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script>
    async function executeSecureLoginGate() {
        const selectedRole = document.getElementById('ddlRole').value;
        const email = document.getElementById('txtEmail').value.trim();
        const password = document.getElementById('txtPassword').value;

        if(!email || !password) { alert("⚠️ Email and password required!"); return; }

        // Owner Bypass Command Console For Admin Desk
        if(email === "admin@myguru.com" && password === "Vishnu@MyGuru") {
            const adminSession = { name: "Master Admin Vishnu", role: "Admin", roleType: "Admin" };
            localStorage.setItem('myguru_user', JSON.stringify(adminSession));
            routeUserToDashboard("Admin");
            return;
        }

        try {
            // Step 1: Trigger Native Supabase Auth Sign In
            const { data: authData, error: authError } = await _supabase.auth.signInWithPassword({
                email: email, password: password
            });
            if(authError) throw authError;

            const userId = authData.user.id;

            // Step 2: Cross-check role alignment from public.common_users
            const { data: coreUser, error: coreErr } = await _supabase
                .from('common_users')
                .select('*')
                .eq('id', userId)
                .maybeSingle();

            if(coreErr || !coreUser) { alert("❌ Central user record node missing."); return; }
            if(coreUser.role.toLowerCase() !== selectedRole.toLowerCase()) { alert("⚠️ Account classification role mismatch!"); return; }

            // Step 3: Fetch custom payload attributes from specific profile sheets
            let targetTable = selectedRole === 'Teacher' ? 'teacher_profiles' : (selectedRole === 'School' ? 'school_profiles' : 'parent_profiles');
            const { data: profile, error: profErr } = await _supabase.from(targetTable).select('*').eq('id', userId).maybeSingle();

            const userPacket = {
                id: userId,
                role: selectedRole,
                roleType: selectedRole,
                subscription: coreUser.subscription,
                account_status: coreUser.account_status,
                profileData: profile || {}
            };

            localStorage.setItem('myguru_user', JSON.stringify(userPacket));
            alert(`✓ Handshake Verified. Welcome back!`);
            routeUserToDashboard(selectedRole);

        } catch(e) { alert("Access Denied: " + e.message); }
    }
</script>
</body>
</html>
